<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogify | Premium Blogging Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <a href="#" class="logo" onclick="showView('feed')">Blogify</a>
            <nav id="nav-links">
                <!-- Dynamic Links based on Auth State -->
            </nav>
        </header>

        <main id="main-content">
            <!-- Dynamic Content -->
            <div id="feed-view" class="view">
                <div id="posts-container">
                    <!-- Posts will be loaded here -->
                </div>
            </div>

            <div id="auth-view" class="view hidden">
                <div class="auth-form card">
                    <h2 id="auth-title">Login</h2>
                    <p id="auth-message" style="color: red;"></p>
                    <form id="auth-form-el">
                        <div class="form-group" id="name-group">
                            <label>Name</label>
                            <input type="text" id="auth-name" placeholder="Your Name">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="auth-email" placeholder="email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="auth-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Continue</button>
                    </form>
                    <p style="margin-top: 1rem; text-align: center; font-size: 0.875rem;">
                        <span id="auth-toggle-text">Don't have an account?</span>
                        <span id="auth-toggle">Sign up</span>
                    </p>
                </div>
            </div>

            <div id="dashboard-view" class="view hidden">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h1>My Posts</h1>
                    <button class="btn-primary" onclick="openPostModal()">New Post</button>
                </div>
                <div id="my-posts-container">
                    <!-- User's posts will be loaded here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Edit -->
    <div id="post-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modal-title">Create New Post</h2>
            <form id="post-form">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="post-title" required>
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="post-content" rows="10" required></textarea>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn-outline" onclick="closePostModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Post</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
